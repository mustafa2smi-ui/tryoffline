<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice Calculator PWA</title>
  <meta name="theme-color" content="#2c3e50">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.png" type="image/png">
  <style>
    :root{
  --bg:#2c3e50; --paper:#0D0D0D; --ink:#ecf0f1; --muted:#bdc3c7;
  --accent:#f1c40f; --accent2:#f39c12; --danger:#e74c3c; --line:#46627f;
  --shadow:rgba(0, 0, 0, 0.4);
  --border:#f1c40f;
  --dotted-line: #4a6580;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; padding: 20px 0;
}

.wrap{ max-width:900px; width: 100%; margin: 20px auto; padding:0 10px; }
.controls{ display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.spacer{ flex:1 }

/* Button Styles Upgrade */
.btn{
  background: linear-gradient(to bottom, #f1c40f, #f39c12);
  color:#2c3e50; border:1px solid #f39c12; padding:10px 16px; border-radius:4px;
  cursor:pointer; font-weight:600; box-shadow:0 2px 6px var(--shadow);
  transition: all 0.2s ease;
}
.sq-btn {
  padding: 10px 14px;
  font-size: 18px;
}
.btn:hover { background: linear-gradient(to bottom, #f39c12, #e67e22); }

/* Entry Mode Panel Box */
.entry-box {
  background: #1a252f; border: 1px solid var(--line);
  padding: 15px; border-radius: 6px; margin-bottom: 15px;
}
.entry-box h3 { margin-bottom: 10px; color: var(--accent); font-size: 16px; }
.entry-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
.entry-box input {
  background: #2c3e50; border: 1px solid var(--line); color: var(--ink);
  padding: 8px; border-radius: 4px; outline: none; font-size: 14px;
}
.card-hidden { display: none !important; }

/* Paper Component - Reduced Padding for Edge Alignment */
.paper{
  background:var(--paper); border-radius:6px; border: 2px solid var(--border);
  box-shadow: 0 12px 30px var(--shadow); overflow:hidden; position: relative;
  padding: 15px 8px; /* Daba kar space nikalne ke liye edge tight kiya */
}
#meta{ color:var(--muted); font-size:14px; font-weight:500; position:absolute; top:10px; left:10px; }

/* Row Management */
.row { display:flex; align-items:center; border-bottom:1px dotted var(--dotted-line); padding:6px 0; position: relative; z-index: 2; }
.sl { width:22px; color:var(--accent); text-align:left; font-weight:700; font-size: 14px; }
.input-wrapper { flex: 1; position: relative; }
.input {
  width: 100%; outline:none; white-space:pre-wrap; min-height:22px; color: var(--ink);
  border: none; padding: 3px 0; background: transparent; font-size: 15px; font-weight: 500;
}
.input:focus { background: rgba(241, 196, 15, 0.1); border-radius: 3px; }
.result{ width:90px; text-align:right; color:var(--accent2); font-weight:700; font-size: 15px; }

/* Autocomplete Suggestion Dropdown List */
.suggest-box {
  position: absolute; left: 0; top: 100%; width: 100%; background: #1e1e1e;
  border: 1px solid var(--border); border-top: none; z-index: 999;
  max-height: 150px; overflow-y: auto; border-radius: 0 0 4px 4px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}
.suggest-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #333; font-size: 14px; color: var(--ink); }
.suggest-item:hover { background: var(--accent); color: #000; }

/* Totals & Remarks */
.totals{ border-top:2px solid var(--border); padding:16px 0 10px; margin-top: 8px; position: relative; z-index: 2; }
.total{ text-align:right; font-weight:800; color:var(--accent); font-size: 1.25em; }
.words{ margin-top:6px; color:var(--muted); font-size:13px; text-align:right; font-style: italic; }
.previous-balance { display:inline-block; text-align: right; margin-top: 2px; font-size: 15px; color: var(--ink); border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; outline: none; min-width: 100px; }
.remark{ text-align:center; padding:10px 8px; font-weight:600; color:var(--accent); border-bottom: 2px solid var(--border) !important; outline:none; z-index: 2; font-size: 15px; margin: 4px 0; }
.remark:last-of-type{ border-top: 2px solid var(--border) !important; border-bottom: none !important; margin-top: 12px; }
.remark:empty:before{ content:attr(data-placeholder); color:var(--muted); font-weight:400; }
.remark[contenteditable="true"] { white-space: nowrap; overflow: hidden; }
.remark[contenteditable="true"] br { display: none; }

/* Sticky Operator Bar Styling */
.operator-bar { display: flex; gap: 8px; justify-content: space-between; position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 10px 0; margin-bottom: 16px; }
.op-btn { flex: 1; background: #34495e; color: var(--accent); border: 1px solid var(--line); padding: 12px 0; border-radius: 6px; font-size: 18px; font-weight: 700; cursor: pointer; touch-action: manipulation; }
.op-btn:active { background: var(--accent); color: #2c3e50; }

@media (max-width: 600px) {
  .operator-bar { position: fixed; top: auto; bottom: 0; left: 0; width: 100%; padding: 10px 14px; background: #1a252f; box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5); margin-bottom: 0; gap: 6px; }
  .op-btn { padding: 16px 0; font-size: 22px; }
  body { padding-bottom: 80px; }
  .entry-grid { grid-template-columns: 1fr; }
}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="controls">
      <button id="modeBtn" class="btn mode-btn">📋 Bill Mode</button>
      <div class="spacer"></div>
      <button id="clearBtn" class="btn sq-btn" style="background:var(--danger); color:#fff;" title="Clear All">🗑️</button>
      <button id="saveBtn" class="btn sq-btn" title="Save as Image">💾</button>
    </div>

    <div id="entryContainer" class="entry-box card-hidden">
      <h3>📥 Add Item to Database</h3>
      <div class="entry-grid">
        <input type="text" id="itemCode" placeholder="Item Code (e.g., 101)">
        <input type="text" id="itemName" placeholder="Item Name">
        <input type="number" id="itemWholesale" placeholder="Wholesale Price">
        <input type="number" id="itemRetail" placeholder="Retail Price">
      </div>
      <div style="margin-top: 10px; display: flex; gap: 10px;">
        <button id="addItemBtn" class="btn" style="flex:1;">Save Item</button>
        <select id="priceModeSelect" class="btn" style="background: #34495e; color: #fff;">
          <option value="retail">Use Retail Price</option>
          <option value="wholesale">Use Wholesale Price</option>
        </select>
      </div>
    </div>

    <div id="paper" class="paper">
      <div class="header">
        <div id="meta">
          <span id="date"></span> <span id="time"></span>
        </div>
        <br>
        <h1>INVOICE CALCULATOR</h1>
        <p>Professional Billing Solution</p>
      </div>
      
      <div class="remark" contenteditable="true" maxlength="20" data-placeholder="Customer Name"></div>
      
      <div id="container"></div>
      
      <div class="remark" contenteditable="true" maxlength="20" data-placeholder="Payment Method (Cash/Credit)"></div>
      <div class="totals">
        <div id="total" class="total">Total = 0</div>
        <div id="totalWords" class="words">In Words: Zero Rupees Only</div>
        <label style="color:var(--muted); font-size:14px; display:block; text-align:right; margin-top:8px;">Previous Balance</label>
        <div style="text-align: right;">
          <div class="previous-balance" contenteditable="true" data-placeholder="0" maxlength="10"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="operator-bar">
    <button class="op-btn" data-op="+">+</button>
    <button class="op-btn" data-op="-">-</button>
    <button class="op-btn" data-op="*">×</button>
    <button class="op-btn" data-op="/">÷</button>
    <button class="op-btn" data-op="(">(</button>
    <button class="op-btn" data-op=")">)</button>
  </div>
<script> 
  const html2canvasScript = document.createElement('script');
html2canvasScript.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
document.head.appendChild(html2canvasScript);

(function(){
  const container = document.getElementById("container");
  const totalBox  = document.getElementById("total");
  const totalWordsBox = document.getElementById("totalWords");
  const dateEl = document.getElementById("date");
  const timeEl = document.getElementById("time");
  const saveBtn = document.getElementById("saveBtn");
  const clearBtn = document.getElementById("clearBtn");
  const modeBtn = document.getElementById("modeBtn");
  const entryContainer = document.getElementById("entryContainer");
  const addItemBtn = document.getElementById("addItemBtn");
  const priceModeSelect = document.getElementById("priceModeSelect");
  const previousBalanceEl = document.querySelector(".previous-balance");

  // LocalStorage Database Setup
  let itemDatabase = JSON.parse(localStorage.getItem("invoice_db")) || [];

  /* ---------- Utils ---------- */
  function setCaretToEnd(el){
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function nowDateTimeTick(){
    const now = new Date();
    dateEl.textContent = now.toLocaleDateString('en-IN', {year:'numeric', month:'short', day:'numeric'});
    timeEl.textContent = now.toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12:true});
  }
  setInterval(nowDateTimeTick, 1000);
  nowDateTimeTick();

  function evalExpr(expr){
    try{
      const js=expr.replace(/\^/g,"**");
      const val=Function('"use strict";return('+js+')')();
      if(typeof val==="number" && isFinite(val))
        return Number.isInteger(val)?val:parseFloat(val.toFixed(2));
    }catch(e){}
    return 0;
  }

  function numberToWordsIndian(num){
    num = Math.floor(Math.abs(num));
    if (num === 0) return "Zero";
    const ones = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
    const tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
    function twoDigits(n){ if(n<20) return ones[n]; return tens[Math.floor(n/10)] + (n%10?" " + ones[n%10]:""); }
    function threeDigits(n){ const h=Math.floor(n/100), r=n%100; return (h?ones[h]+" Hundred":"") + (h&&r?" ":"") + (r?twoDigits(r):""); }
    let words = "";
    const crore = Math.floor(num/10000000); num%=10000000;
    const lakh  = Math.floor(num/100000);   num%=100000;
    const thou  = Math.floor(num/1000);     num%=1000;
    if(crore) words += threeDigits(crore) + " Crore";
    if(lakh)  words += (words?" ":"") + twoDigits(lakh) + " Lakh";
    if(thou)  words += (words?" ":"") + twoDigits(thou) + " Thousand";
    if(num)   words += (words?" ":"") + threeDigits(num);
    return words.trim();
  }

  function totalInWords(amt){
    const rupees = Math.floor(amt);
    const paise = Math.round((amt - rupees) * 100);
    let s = numberToWordsIndian(rupees) + " Rupees";
    if (paise>0) s += " and " + numberToWordsIndian(paise) + " Paise";
    return s + " Only";
  }

  // Auto-Save New Items from Invoice String Parsing
  function autoSaveFromText(text) {
    // Expected Pattern: ItemName [Code] 50*2 ya ItemName [Code] 100
    const match = text.match(/^(.+?)\s*\[(.*?)]\s*([0-9.\s()+\-*/^]+)$/);
    if(match) {
      const name = match[1].trim();
      const code = match[2].trim();
      const expr = match[3].trim();
      const price = evalExpr(expr);

      if(name && code && price > 0) {
        const exists = itemDatabase.find(i => i.code === code || i.name.toLowerCase() === name.toLowerCase());
        if(!exists) {
          itemDatabase.push({ code, name, wholesale: price, retail: price });
          localStorage.setItem("invoice_db", JSON.stringify(itemDatabase));
        }
      }
    }
  }

  /* ---------- Row factory with Autocomplete Suggestion ---------- */
  function makeRow(i, text=""){
    const row = document.createElement("div");
    row.className = "row";

    const sl = document.createElement("div");
    sl.className = "sl";
    sl.textContent = i+1;

    const wrapper = document.createElement("div");
    wrapper.className = "input-wrapper";

    const input = document.createElement("div");
    input.className = "input";
    input.contentEditable = true;
    input.textContent = text;

    wrapper.appendChild(input);

    const result = document.createElement("div");
    result.className = "result";
/*
    // Handle Suggestions
    input.addEventListener("input", function() {
      render();
      const val = input.textContent.trim().toLowerCase();
      // Purani Suggestion box hatayein
      const oldBox = wrapper.querySelector(".suggest-box");
      if(oldBox) oldBox.remove();

      if(!val) return;

      const matches = itemDatabase.filter(item => 
        item.name.toLowerCase().includes(val) || item.code.toLowerCase().includes(val)
      );

      if(matches.length > 0) {
        const suggestBox = document.createElement("div");
        suggestBox.className = "suggest-box";
        
        matches.forEach(match => {
          const itemDiv = document.createElement("div");
          itemDiv.className = "suggest-item";
          const pMode = priceModeSelect.value;
          const price = pMode === 'wholesale' ? match.wholesale : match.retail;
          itemDiv.textContent = `${match.name} [${match.code}] - ₹${price}`;
          
          itemDiv.addEventListener("click", function(e) {
            e.preventDefault();
            input.textContent = `${match.name} [${match.code}] ${price}`;
            suggestBox.remove();
            render();
            setCaretToEnd(input);
          });
          suggestBox.appendChild(itemDiv);
        });
        wrapper.appendChild(suggestBox);
      }
    });
*/
        // Handle Suggestions with Full Touch Support
    input.addEventListener("input", function() {
      render();
      const val = input.textContent.trim().toLowerCase();
      // Purani Suggestion box hatayein
      const oldBox = wrapper.querySelector(".suggest-box");
      if(oldBox) oldBox.remove();

      if(!val) return;

      const matches = itemDatabase.filter(item => 
        item.name.toLowerCase().includes(val) || item.code.toLowerCase().includes(val)
      );

      if(matches.length > 0) {
        const suggestBox = document.createElement("div");
        suggestBox.className = "suggest-box";
        
        matches.forEach(match => {
          const itemDiv = document.createElement("div");
          itemDiv.className = "suggest-item";
          const pMode = priceModeSelect.value;
          const price = pMode === 'wholesale' ? match.wholesale : match.retail;
          itemDiv.textContent = `${match.name} [${match.code}] - ₹${price}`;
          
          // Mobile Touch aur Desktop Click dono ko handle karne ke liye pro handler
          const selectItem = (e) => {
            e.preventDefault(); // Blur hone se rokega taaki touch register ho sake
            e.stopPropagation();
            
            input.textContent = `${match.name} [${match.code}] ${price}`;
            suggestBox.remove();
            
            render();
            setCaretToEnd(input);
            activeInput = input; // Input focus track active rakhein
          };

          // Desktop users ke liye
          itemDiv.addEventListener("mousedown", selectItem);
          // Mobile users ke liye instant touch response
          itemDiv.addEventListener("touchstart", selectItem);
          
          suggestBox.appendChild(itemDiv);
        });
        wrapper.appendChild(suggestBox);
      }
    });

    // Remove suggestions on blur/focus out
    input.addEventListener("blur", function() {
      setTimeout(() => {
        const box = wrapper.querySelector(".suggest-box");
        if(box) box.remove();
        autoSaveFromText(input.textContent); // Auto-save trigger dynamically
      }, 300);
    });

    input.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        e.preventDefault();
        if(input.textContent.trim() !== ""){
          container.appendChild(makeRow(container.children.length));
          updateSL();
          render();
          container.lastChild.querySelector(".input").focus();
        }
      }
      if(e.key === "Backspace" && input.textContent.trim() === ""){
        if(container.children.length > 1){
          e.preventDefault();
          const prev = row.previousElementSibling || row.nextElementSibling;
          row.remove();
          updateSL();
          render();
          if(prev){
            const target = prev.querySelector(".input");
            target.focus();
            setCaretToEnd(target);
          }
        }
      }
    });

    row.appendChild(sl);
    row.appendChild(wrapper);
    row.appendChild(result);
    return row;
  }

  function updateSL(){
    [...container.children].forEach((row,i)=>{ row.querySelector(".sl").textContent = i+1; });
  }

  function render(){
    let grand = 0;
    const previousBalance = parseFloat(previousBalanceEl.textContent) || 0;
    grand += previousBalance;

    [...container.children].forEach(row=>{
      const text = row.querySelector(".input").textContent;
      const resBox = row.querySelector(".result");
      let val=0;
      const m=text.match(/([0-9.\s()+\-*/^]+)$/);
      if(m){
        const expr=m[1].trim();
        if(expr && /[0-9]/.test(expr)) val=evalExpr(expr);
      }
      resBox.textContent = val ? val.toLocaleString('en-IN') : "";
      grand += val;
    });

    totalBox.textContent = "Total = " + grand.toLocaleString('en-IN');
    totalWordsBox.textContent = "In Words: " + totalInWords(grand);
  }

  // Entry Mode vs Bill Mode View Switcher
  modeBtn.addEventListener("click", function() {
    if(entryContainer.classList.contains("card-hidden")) {
      entryContainer.classList.remove("card-hidden");
      modeBtn.textContent = "📝 Entry Mode";
    } else {
      entryContainer.classList.add("card-hidden");
      modeBtn.textContent = "📋 Bill Mode";
    }
  });

  // Explicit Item Entry Database addition
  addItemBtn.addEventListener("click", function() {
    const code = document.getElementById("itemCode").value.trim();
    const name = document.getElementById("itemName").value.trim();
    const wholesale = parseFloat(document.getElementById("itemWholesale").value) || 0;
    const retail = parseFloat(document.getElementById("itemRetail").value) || 0;

    if(code && name && (wholesale || retail)) {
      itemDatabase.push({ code, name, wholesale, retail });
      localStorage.setItem("invoice_db", JSON.stringify(itemDatabase));
      alert(`Item "${name}" database me save ho gaya!`);
      document.getElementById("itemCode").value = "";
      document.getElementById("itemName").value = "";
      document.getElementById("itemWholesale").value = "";
      document.getElementById("itemRetail").value = "";
    } else {
      alert("Kripya Code, Name aur koi ek Price jaroor bharein!");
    }
  });

  /* ---------- Operator Bar & Scroll Core Sync ---------- */
  let activeInput = null;
  function scrollToActiveInput(element) {
    if (!element) return;
    setTimeout(() => { element.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 50);
  }

  container.addEventListener("focusin", function(e) {
    if(e.target.classList.contains("input")) {
      activeInput = e.target;
      scrollToActiveInput(activeInput);
    }
  });

  document.querySelectorAll(".op-btn").forEach(btn => {
    btn.addEventListener("click", function(e) {
      e.preventDefault();
      if (!activeInput && container.children.length > 0) activeInput = container.lastChild.querySelector(".input");
      if (activeInput) {
        activeInput.focus();
        const op = btn.getAttribute("data-op");
        const sel = window.getSelection();
        if (!sel.rangeCount) return;
        const range = sel.getRangeAt(0);
        range.deleteContents();
        const textNode = document.createTextNode(op);
        range.insertNode(textNode);
        range.setStartAfter(textNode);
        range.setEndAfter(textNode);
        sel.removeAllRanges();
        sel.addRange(range);
        render();
        scrollToActiveInput(activeInput);
      }
    });
  });

  // Save Image Layout Action
  async function saveAsImage(){
    const paper = document.getElementById("paper");
    await new Promise(r=>requestAnimationFrame(r));
    if (typeof html2canvas === 'undefined') { alert('html2canvas tool loading, please wait...'); return; }
    const canvas = await html2canvas(paper, {backgroundColor:null, scale:2});
    const link = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    link.download = `invoice-${stamp}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
  
  saveBtn.addEventListener("click", saveAsImage);

  clearBtn.addEventListener("click", function(){
    container.innerHTML="";
    container.appendChild(makeRow(0));
    previousBalanceEl.textContent="";
    render();
  });

  previousBalanceEl.addEventListener("input", function(){
    let val = previousBalanceEl.textContent.replace(/\D/g, "");
    if(val.length > 10) val = val.slice(0,10);
    if(previousBalanceEl.textContent !== val){ previousBalanceEl.textContent = val; setCaretToEnd(previousBalanceEl); }
    render();
  });

  // Remarks validation structure
  document.querySelectorAll('.remark').forEach(remark => {
    remark.addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });
    remark.addEventListener('paste', e => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text.replace(/[\r\n]+/g, ' '));
    });
  });

  container.appendChild(makeRow(0));
  render();
})();
      
</script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(()=>{});
      });
    }
    window.addEventListener('beforeinstallprompt', (e) => e.preventDefault());
  </script>
</body>
</html>
