<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notebook Invoice Calculator</title>
  <meta name="theme-color" content="#1a252f">
  
  <style>
    :root {
      --bg: #1a252f;          /* Dark modern wrapper background */
      --paper: #ffffff;       /* Real notebook white paper */
      --ink: #0a2540;         /* Deep dark blue ink pen color */
      --muted: #5b7a9c;       /* Muted blue for labels */
      --accent: #d35400;      /* Dark orange accent */
      --line: #b0c4de;        /* Light blue notebook rule line */
      --shadow: rgba(0, 0, 0, 0.35);
      --danger: #c0392b;
      --green-patch: #e8f8f5; /* Light green strip background */
      --green-text: #117a65;  /* Green text for item code */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 10px;
    }

    .wrap {
      max-width: 650px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 96vh;
    }

    /* Fixed Controls & Header Top Section */
    .header-fixed-container {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding-bottom: 8px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .spacer { flex: 1; }

    /* Compact Square Buttons */
    .btn {
      background: linear-gradient(to bottom, #f1c40f, #f39c12);
      color: #2c3e50;
      border: 1px solid #f39c12;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 2px 4px var(--shadow);
      transition: all 0.15s ease;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sq-btn {
      width: 38px;
      height: 38px;
      padding: 0;
      font-size: 18px;
    }

    .mode-btn {
      height: 38px;
      padding: 0 12px;
    }

    .btn:hover {
      background: linear-gradient(to bottom, #f39c12, #e67e22);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* Combo Box Styling */
    .price-select {
      background: #34495e;
      color: #fff;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0 8px;
      height: 38px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
    }

    /* Real Paper Notebook styling */
    .paper {
      background: var(--paper);
      border-radius: 6px;
      box-shadow: 0 8px 25px var(--shadow);
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: auto; /* Scrollable body */
      position: relative;
      border-left: 10px solid #e74c3c; /* Red notebook margin line on left */
    }

    /* Notebook Red Line margin background */
    .paper::before {
      content: "";
      position: absolute;
      top: 0;
      left: 30px;
      bottom: 0;
      width: 1px;
      background: rgba(231, 76, 60, 0.4);
      pointer-events: none;
      z-index: 1;
    }

    /* Header inside paper */
    .paper-header {
      padding: 15px 15px 5px 45px;
      border-bottom: 2px solid var(--line);
      text-align: center;
      position: relative;
    }

    #meta {
      font-size: 11px;
      font-weight: bold;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .paper-header h1 {
      color: var(--ink);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .paper-header p {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    /* Scrollable Row List Area */
    .row-list {
      padding: 10px 10px 10px 45px;
      flex: 1;
    }

    /* Rows */
    .row {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--line);
      padding: 6px 0;
    }

    .row-main {
      display: flex;
      align-items: center;
      width: 100%;
    }

    .sl {
      width: 25px;
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .input {
      width: 100%;
      outline: none;
      white-space: pre-wrap;
      min-height: 20px;
      color: var(--ink);
      font-family: inherit;
      border: none;
      background: transparent;
      font-size: 15px;
      font-weight: 600;
    }

    .result {
      width: 80px;
      text-align: right;
      color: var(--accent);
      font-weight: 700;
      font-size: 15px;
    }

    /* Code Strip Patch (Just below item text) */
    .code-patch {
      display: none; /* Only visible if code exists */
      background: var(--green-patch);
      color: var(--green-text);
      font-size: 11px;
      font-weight: 700;
      font-style: italic;
      padding: 2px 6px;
      border-radius: 3px;
      margin-top: 3px;
      align-self: flex-start;
      margin-left: 25px;
    }

    .code-patch.visible {
      display: inline-block;
    }

    /* Dropdown suggestions */
    .suggest-box {
      position: absolute;
      left: 0;
      top: 100%;
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--line);
      z-index: 999;
      max-height: 150px;
      overflow-y: auto;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .suggest-item {
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
      color: var(--ink);
    }

    .suggest-item:hover {
      background: #ebebeb;
    }

    /* Paper Footer Totals Area */
    .paper-footer {
      padding: 10px 15px 10px 45px;
      border-top: 2px solid var(--line);
      background: #fafafa;
    }

    .totals {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-lbl {
      font-weight: bold;
      font-size: 14px;
      color: var(--muted);
    }

    .total-val {
      font-weight: 800;
      font-size: 18px;
      color: var(--accent);
    }

    .words {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      text-align: right;
    }

    .previous-balance-container {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .previous-balance {
      text-align: right;
      font-size: 14px;
      color: var(--ink);
      border: 1px dashed var(--line);
      padding: 2px 6px;
      border-radius: 4px;
      outline: none;
      min-width: 80px;
      font-weight: bold;
    }

    /* Mode Indicators & Status Banner */
    .mode-banner {
      background: #1abc9c;
      color: white;
      text-align: center;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .mode-banner.entry {
      background: #3498db;
    }

    /* Floating / Sticky Operators Bar */
    .operator-bar {
      display: flex;
      gap: 6px;
      justify-content: space-between;
      margin-top: 8px;
      background: var(--bg);
      padding: 5px 0;
    }

    .op-btn {
      flex: 1;
      background: #34495e;
      color: #fff;
      border: 1px solid var(--line);
      padding: 10px 0;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .op-btn:active {
      background: var(--line);
      color: #000;
    }

    @media (max-width: 600px) {
      .operator-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 8px 10px;
        background: #111b24;
        box-shadow: 0 -3px 10px rgba(0,0,0,0.5);
        margin-top: 0;
        z-index: 200;
      }
      .op-btn {
        padding: 12px 0;
        font-size: 18px;
      }
      .wrap {
        height: 88vh;
      }
    }
  </style>
</head>
<body>

  <div class="wrap">
    
    <div class="header-fixed-container">
      <div class="controls">
        <button id="modeBtn" class="btn mode-btn">📋 Bill Mode</button>
        <select id="priceModeSelect" class="price-select">
          <option value="retail">Retail Price</option>
          <option value="wholesale">Wholesale Price</option>
        </select>
        <div class="spacer"></div>
        <button id="clearBtn" class="btn sq-btn" style="background:var(--danger); color:#fff;" title="Clear All">🗑️</button>
        <button id="saveBtn" class="btn sq-btn" title="Save Image">💾</button>
      </div>
    </div>

    <div id="paper" class="paper">
      
      <div id="modeStatus" class="mode-banner">Billing Active</div>

      <div class="paper-header">
        <div id="meta">
          <span id="date"></span>
          <span id="time"></span>
        </div>
        <h1>DAILY LEDGER</h1>
        <p>Simple & Smart Ledger Solutions</p>
      </div>

      <div class="row-list" id="container"></div>

      <div class="paper-footer">
        <div class="totals">
          <div class="total-row">
            <span class="total-lbl">Total:</span>
            <span id="total" class="total-val">0.00</span>
          </div>
          <div id="totalWords" class="words">In Words: Zero Rupees Only</div>
          
          <div class="previous-balance-container">
            <span style="font-size:12px; font-weight:bold; color:var(--muted);">Prev Bal:</span>
            <div class="previous-balance" contenteditable="true" data-placeholder="0" id="prevBalBox"></div>
          </div>
        </div>
      </div>

    </div>

    <div class="operator-bar">
      <button class="op-btn" data-op="+">+</button>
      <button class="op-btn" data-op="-">-</button>
      <button class="op-btn" data-op="*">×</button>
      <button class="op-btn" data-op="/">÷</button>
      <button class="op-btn" data-op="(">(</button>
      <button class="op-btn" data-op=")">)</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    (function(){
      const container = document.getElementById("container");
      const totalBox  = document.getElementById("total");
      const totalWordsBox = document.getElementById("totalWords");
      const dateEl = document.getElementById("date");
      const timeEl = document.getElementById("time");
      const saveBtn = document.getElementById("saveBtn");
      const clearBtn = document.getElementById("clearBtn");
      const modeBtn = document.getElementById("modeBtn");
      const modeStatus = document.getElementById("modeStatus");
      const priceModeSelect = document.getElementById("priceModeSelect");
      const prevBalBox = document.getElementById("prevBalBox");

      // App Mode State: 'bill' or 'entry'
      let currentMode = 'bill'; 

      // Offline Database
      let itemDatabase = JSON.parse(localStorage.getItem("ledger_db")) || [
        { code: "101", name: "Aata", price: 40 },
        { code: "102", name: "Shakkar", price: 45 },
        { code: "103", name: "Chawal", price: 60 }
      ];

      function setCaretToEnd(el){
        const range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }

      function nowDateTimeTick(){
        const now = new Date();
        dateEl.textContent = now.toLocaleDateString('en-IN', {year:'numeric', month:'short', day:'numeric'});
        timeEl.textContent = now.toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12:true});
      }
      setInterval(nowDateTimeTick, 1000);
      nowDateTimeTick();

      function evalExpr(expr){
        try{
          const js = expr.replace(/\^/g,"**");
          const val = Function('"use strict";return('+js+')')();
          if(typeof val === "number" && isFinite(val))
            return Number.isInteger(val)?val:parseFloat(val.toFixed(2));
        }catch(e){}
        return 0;
      }

      function numberToWordsIndian(num){
        num = Math.floor(Math.abs(num));
        if (num === 0) return "Zero";
        const ones = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
        const tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
        function twoDigits(n){ if(n<20) return ones[n]; return tens[Math.floor(n/10)] + (n%10?" " + ones[n%10]:""); }
        function threeDigits(n){ const h=Math.floor(n/100), r=n%100; return (h?ones[h]+" Hundred":"") + (h&&r?" ":"") + (r?twoDigits(r):""); }
        let words = "";
        const crore = Math.floor(num/10000000); num%=10000000;
        const lakh  = Math.floor(num/100000);   num%=100000;
        const thou  = Math.floor(num/1000);     num%=1000;
        if(crore) words += threeDigits(crore) + " Crore";
        if(lakh)  words += (words?" ":"") + twoDigits(lakh) + " Lakh";
        if(thou)  words += (words?" ":"") + twoDigits(thou) + " Thousand";
        if(num)   words += (words?" ":"") + threeDigits(num);
        return words.trim();
      }

      function totalInWords(amt){
        const rupees = Math.floor(amt);
        const paise = Math.round((amt - rupees) * 100);
        let s = numberToWordsIndian(rupees) + " Rupees";
        if (paise>0) s += " and " + numberToWordsIndian(paise) + " Paise";
        return s + " Only";
      }

      // Automatically learns new items typed directly on lines
      function parseAndSaveNewItem(text) {
        // Formats expected: "ItemName 50" or "ItemName [Code] 50"
        const cleanText = text.trim();
        const patternWithCode = /^([a-zA-Z\s]+)\s*\[([a-zA-Z0-9]+)\]\s*([0-9.]+)$/;
        const simplePattern = /^([a-zA-Z\s]+)\s*([0-9.]+)$/;

        let name = "", code = "", price = 0;

        if(patternWithCode.test(cleanText)) {
          const match = cleanText.match(patternWithCode);
          name = match[1].trim();
          code = match[2].trim();
          price = parseFloat(match[3]);
        } else if(simplePattern.test(cleanText)) {
          const match = cleanText.match(simplePattern);
          name = match[1].trim();
          price = parseFloat(match[2]);
          code = (itemDatabase.length + 101).toString(); // Auto generate code
        }

        if(name && price > 0) {
          const exists = itemDatabase.find(i => i.name.toLowerCase() === name.toLowerCase());
          if(!exists) {
            itemDatabase.push({ code, name, price });
            localStorage.setItem("ledger_db", JSON.stringify(itemDatabase));
          }
        }
      }

      /* ---------- Row Factory with Embedded Code Patch ---------- */
      function makeRow(i, text=""){
        const row = document.createElement("div");
        row.className = "row";

        const rowMain = document.createElement("div");
        rowMain.className = "row-main";

        const sl = document.createElement("div");
        sl.className = "sl";
        sl.textContent = i+1;

        const wrapper = document.createElement("div");
        wrapper.className = "input-wrapper";

        const input = document.createElement("div");
        input.className = "input";
        input.contentEditable = true;
        input.textContent = text;

        wrapper.appendChild(input);

        const result = document.createElement("div");
        result.className = "result";

        rowMain.appendChild(sl);
        rowMain.appendChild(wrapper);
        rowMain.appendChild(result);

        // Code display patch under item
        const codePatch = document.createElement("div");
        codePatch.className = "code-patch";
        
        row.appendChild(rowMain);
        row.appendChild(codePatch);

        // Suggestions Event Handler with proper touch logic
        input.addEventListener("input", function() {
          render();
          const val = input.textContent.trim().toLowerCase();
          const oldBox = wrapper.querySelector(".suggest-box");
          if(oldBox) oldBox.remove();

          if(!val) return;

          const matches = itemDatabase.filter(item => 
            item.name.toLowerCase().includes(val) || item.code.toLowerCase().includes(val)
          );

          if(matches.length > 0) {
            const suggestBox = document.createElement("div");
            suggestBox.className = "suggest-box";
            
            matches.forEach(match => {
              const itemDiv = document.createElement("div");
              itemDiv.className = "suggest-item";
              itemDiv.textContent = `${match.name} [${match.code}] - ₹${match.price}`;
              
              const selectItem = (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                input.textContent = `${match.name} ${match.price}`;
                suggestBox.remove();
                
                render();
                setCaretToEnd(input);
                activeInput = input;
              };

              itemDiv.addEventListener("mousedown", selectItem);
              itemDiv.addEventListener("touchstart", selectItem);
              suggestBox.appendChild(itemDiv);
            });
            wrapper.appendChild(suggestBox);
          }
        });

        // Save on blur & clean up suggestions
        input.addEventListener("blur", function() {
          setTimeout(() => {
            const box = wrapper.querySelector(".suggest-box");
            if(box) box.remove();
            
            // Auto save item configuration
            parseAndSaveNewItem(input.textContent);
            render();
          }, 300);
        });

        // Key bindings
        input.addEventListener("keydown", function(e){
          if(e.key === "Enter"){
            e.preventDefault();
            if(input.textContent.trim() !== ""){
              container.appendChild(makeRow(container.children.length));
              updateSL();
              render();
              container.lastChild.querySelector(".input").focus();
            }
          }
          if(e.key === "Backspace" && input.textContent.trim() === ""){
            if(container.children.length > 1){
              e.preventDefault();
              const prev = row.previousElementSibling || row.nextElementSibling;
              row.remove();
              updateSL();
              render();
              if(prev){
                const target = prev.querySelector(".input");
                target.focus();
                setCaretToEnd(target);
              }
            }
          }
        });

        return row;
      }

      function updateSL(){
        [...container.children].forEach((row,i)=>{ 
          row.querySelector(".sl").textContent = i+1; 
        });
      }

      function render(){
        let grand = 0;
        const previousBalance = parseFloat(prevBalBox.textContent) || 0;
        
        if (currentMode === 'bill') {
          grand += previousBalance;
        }

        [...container.children].forEach(row => {
          const inputEl = row.querySelector(".input");
          const text = inputEl.textContent.trim();
          const resBox = row.querySelector(".result");
          const patchBox = row.querySelector(".code-patch");
          
          let val = 0;

          // Process and identify Item code under input
          const codeMatch = text.match(/\[([a-zA-Z0-9]+)\]/);
          if (codeMatch) {
            patchBox.textContent = `Code: ${codeMatch[1]}`;
            patchBox.classList.add("visible");
          } else {
            // Check in Database by Name to display existing Code
            const wordTokens = text.split(/\s+/);
            const foundItem = itemDatabase.find(i => i.name.toLowerCase() === wordTokens[0].toLowerCase());
            if (foundItem) {
              patchBox.textContent = `Code: ${foundItem.code}`;
              patchBox.classList.add("visible");
            } else {
              patchBox.classList.remove("visible");
            }
          }

          if (currentMode === 'bill') {
            // Compute expressions only in billing mode
            const m = text.match(/([0-9.\s()+\-*/^]+)$/);
            if(m){
              const expr = m[1].trim();
              if(expr && /[0-9]/.test(expr)) val = evalExpr(expr);
            }
            resBox.textContent = val ? val.toLocaleString('en-IN') : "";
            grand += val;
            resBox.style.display = "block";
          } else {
            // Hide calculations in Entry Mode
            resBox.style.display = "none";
          }
        });

        if (currentMode === 'bill') {
          totalBox.textContent = grand.toLocaleString('en-IN');
          totalWordsBox.textContent = "In Words: " + totalInWords(grand);
          totalWordsBox.style.display = "block";
        } else {
          totalBox.textContent = "---- (Entry Active)";
          totalWordsBox.style.display = "none";
        }
      }

      /* ---------- Mode Toggle Logic ---------- */
      modeBtn.addEventListener("click", function() {
        if(currentMode === 'bill') {
          currentMode = 'entry';
          modeBtn.textContent = "✍️ Entry Mode";
          modeStatus.textContent = "Database Entry Active";
          modeStatus.classList.add("entry");
        } else {
          currentMode = 'bill';
          modeBtn.textContent = "📋 Bill Mode";
          modeStatus.textContent = "Billing Active";
          modeStatus.classList.remove("entry");
        }
        render();
      });

      /* ---------- Operators Mobile Integration ---------- */
      let activeInput = null;
      function scrollToActiveInput(element) {
        if (!element) return;
        setTimeout(() => { element.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 50);
      }

      container.addEventListener("focusin", function(e) {
        if(e.target.classList.contains("input")) {
          activeInput = e.target;
          scrollToActiveInput(activeInput);
        }
      });

      document.querySelectorAll(".op-btn").forEach(btn => {
        btn.addEventListener("click", function(e) {
          e.preventDefault();
          if (!activeInput && container.children.length > 0) activeInput = container.lastChild.querySelector(".input");
          if (activeInput) {
            activeInput.focus();
            const op = btn.getAttribute("data-op");
            const sel = window.getSelection();
            if (!sel.rangeCount) return;
            const range = sel.getRangeAt(0);
            range.deleteContents();
            const textNode = document.createTextNode(op);
            range.insertNode(textNode);
            range.setStartAfter(textNode);
            range.setEndAfter(textNode);
            sel.removeAllRanges();
            sel.addRange(range);
            render();
            scrollToActiveInput(activeInput);
          }
        });
      });

      // Export Image Trigger
      async function saveAsImage(){
        const paper = document.getElementById("paper");
        await new Promise(r=>requestAnimationFrame(r));
        if (typeof html2canvas === 'undefined') { alert('html2canvas loading... please try again in a moment'); return; }
        const canvas = await html2canvas(paper, {backgroundColor:null, scale:2});
        const link = document.createElement('a');
        const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
        link.download = `ledger-${stamp}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
      
      saveBtn.addEventListener("click", saveAsImage);

      clearBtn.addEventListener("click", function(){
        container.innerHTML = "";
        container.appendChild(makeRow(0));
        prevBalBox.textContent = "";
        render();
      });

      prevBalBox.addEventListener("input", function(){
        let val = prevBalBox.textContent.replace(/\D/g, "");
        if(val.length > 10) val = val.slice(0,10);
        if(prevBalBox.textContent !== val){ prevBalBox.textContent = val; setCaretToEnd(prevBalBox); }
        render();
      });

      // Initiate default row
      container.appendChild(makeRow(0));
      render();
    })();
  </script>
</body>
</html>
