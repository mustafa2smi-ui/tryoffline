<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notebook Bill - Pro</title>
  <style>
    :root { --bg: #1a252f; --paper: #ffffff; --ink: #0a2540; --accent: #d35400; --line: #b0c4de; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: sans-serif; }
    .wrap { display: flex; flex-direction: column; height: 100%; width: 100%; max-width: 600px; margin: 0 auto; }
    .brand-header { background: #1abc9c; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
    .paper { background: white; flex: 1; overflow-y: auto; padding: 15px; }
    .row { display: flex; border-bottom: 1px solid var(--line); padding: 5px 0; align-items: center; }
    .input { flex: 1; outline: none; font-size: 16px; font-weight: 600; padding: 5px; }
    .result { width: 80px; text-align: right; color: var(--accent); font-weight: bold; }
    .bottom-dashboard { background: #111b24; padding: 10px; color: white; display: flex; flex-direction: column; gap: 8px; }
    .scanner-wrapper { display: none; background: #000; padding: 10px; }
    .btn { padding: 8px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand-header">
      <button onclick="toggleScanner()" class="btn" style="background:#e67e22;">📷 Scan</button>
      <select id="printModeSelect"><option value="ENG">Print: ENG</option><option value="MULTI">Print: MULTI</option></select>
    </div>

    <div id="scannerWrapper" class="scanner-wrapper">
      <div id="reader" style="width:100%"></div>
      <button onclick="stopScanner()" class="btn" style="background:#e74c3c; width:100%; margin-top:5px;">Stop</button>
    </div>

    <div id="paper" class="paper">
      <div id="custBlock">Cust: <span contenteditable="true" id="custNameInput" style="border-bottom:1px solid #000;"></span></div>
      <div id="container"></div>
    </div>

    <div class="bottom-dashboard">
      <div id="total" style="font-size:24px; font-weight:bold; text-align:right;">₹0.00</div>
      <div style="display:flex; gap:5px;">
        <button id="clearBtn" class="btn" style="background:#c0392b;">🗑️</button>
        <button id="printBtn" class="btn" style="background:#8e44ad;">🖨️</button>
        <button id="localSaveBtn" class="btn" style="background:#27ae60;">💾</button>
        <button id="csvBtn" class="btn" style="background:#f39c12;">📊</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const container = document.getElementById("container");
    const totalBox = document.getElementById("total");
    let itemDatabase = JSON.parse(localStorage.getItem("ledger_db_v2")) || [];

    // Row Logic
    function makeRow(text="") {
      const row = document.createElement("div"); row.className = "row";
      row.innerHTML = `<div class="input" contenteditable="true">${text}</div><div class="result"></div>`;
      row.querySelector(".input").oninput = render;
      return row;
    }

    function render() {
      let grand = 0;
      [...container.children].forEach(row => {
        const text = row.querySelector(".input").textContent;
        let match = text.match(/(\d+)$/);
        let val = match ? parseInt(match[1]) : 0;
        row.querySelector(".result").textContent = val ? "₹"+val : "";
        grand += val;
      });
      totalBox.textContent = "₹" + grand.toLocaleString();
    }

    // Barcode Scanner
    let html5QrCode;
    function toggleScanner() {
      const sw = document.getElementById("scannerWrapper");
      if(sw.style.display === 'flex') stopScanner();
      else { sw.style.display = 'flex'; startScanner(); }
    }
    function startScanner() {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 150 }, (text) => {
        stopScanner();
        let item = itemDatabase.find(i => i.code == text);
        if(item) {
          container.appendChild(makeRow(item.name + " " + item.retail));
          render();
        } else alert("Item not found");
      });
    }
    function stopScanner() { 
      document.getElementById("scannerWrapper").style.display = 'none';
      if(html5QrCode) html5QrCode.stop();
    }

    // Printer Logic with Translation
    async function translateText(text) {
        if (/^[a-zA-Z0-9\s]+$/.test(text)) return text;
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURI(text)}`);
        const data = await res.json();
        return data[0][0][0];
    }

    printBtn.onclick = async () => {
      const mode = document.getElementById("printModeSelect").value;
      const device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'Bluetooth' }], optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb'] });
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
      const char = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');
      
      let esc = "\x1B\x40\x1B\x61\x01STORE BILL\n--------------------------------\n";
      for (let row of [...container.children]) {
        let text = row.querySelector(".input").textContent;
        let amt = row.querySelector(".result").textContent;
        if(!text) continue;
        
        let printName = text;
        if(mode === 'ENG') {
            printName = await translateText(text);
            printName = printName.replace(/[^\x00-\x7F]/g, ""); // Strip non-ascii
        }
        
        // Alignment: Name (20 chars) + Amount (12 chars) = 32 chars width
        esc += printName.substring(0,20).padEnd(20) + amt.replace('₹','Rs.').padStart(12) + "\n";
      }
      esc += "--------------------------------\nTOTAL: " + totalBox.textContent.replace('₹','Rs.') + "\n\n\n";
      await char.writeValue(new TextEncoder().encode(esc));
    };

    container.appendChild(makeRow());
  </script>
</body>
</html>
