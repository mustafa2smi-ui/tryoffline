  <script>
    (function(){
      const container = document.getElementById("container");
      const totalBox  = document.getElementById("total");
      const totalWordsBox = document.getElementById("totalWords");
      const dateEl = document.getElementById("date");
      const timeEl = document.getElementById("time");
      const localSaveBtn = document.getElementById("localSaveBtn");
      const clearBtn = document.getElementById("clearBtn");
      const printBtn = document.getElementById("printBtn");
      const shareBtn = document.getElementById("shareBtn");
      const entryModeBtn = document.getElementById("entryModeBtn");
      const billModeBtn = document.getElementById("billModeBtn");
      const modeStatus = document.getElementById("modeStatus");
      
      const printModeSelect = document.getElementById("printModeSelect");
      const dbEntryPanel = document.getElementById("dbEntryPanel");
      const dbSaveBtn = document.getElementById("dbSaveBtn");
      const dbListContainer = document.getElementById("dbListContainer");
      const dbItemsList = document.getElementById("dbItemsList");
      const panelTitle = document.getElementById("panelTitle");
      const bottomDashboard = document.getElementById("bottomDashboard");
      const custBlock = document.getElementById("custBlock");
      const dbBillsHistoryList = document.getElementById("dbBillsHistoryList");
      const csvBtn = document.getElementById("csvBtn");

      // 🔥 SCANNER VARIABLES (from first code)
      let html5QrCode = null;
      let isScannerRunning = false;
      let lastScannedCode = "";
      let isProcessingScan = false;
// Expose scanner functions globally for onclick handlers
window.stopHardwareCamera = stopHardwareCamera;
window.resumeHardwareScanning = resumeHardwareScanning;
      let savedBillsHistory = JSON.parse(localStorage.getItem("notebook_invoice_history")) || [];
      let currentMode = 'bill'; 
      let activeInput = null;
      let editingItemCode = null; 
      let printerDevice = null; // Core Bluetooth Global Pointer Instance

      let itemDatabase = JSON.parse(localStorage.getItem("ledger_db_v3")) || [
  { code: "101", name: "Aata", price: 40 },
  { code: "102", name: "Shakkar", price: 45 },
  { code: "103", name: "Chawal", price: 60 }
];

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          document.body.style.height = window.visualViewport.height + 'px';
        });
      }

      // 🔥 SCANNER FUNCTIONS (from first code - identical logic and behavior)
      function toggleCameraUI() {
        const pane = document.getElementById('scannerWrapperZone');
        if (pane.style.display === 'flex' || isScannerRunning) {
          stopHardwareCamera();
        } else {
          pane.style.display = 'flex';
          startHardwareCamera();
        }
      }

      function startHardwareCamera() {
        if (isScannerRunning) return;
        document.getElementById('btnResumeCamUI').style.display = "none";
        isProcessingScan = false;
        lastScannedCode = "";
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 250, height: 150 }, aspectRatio: 1.0 };
        html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccessCallback,
          onScanErrorCallback
        ).then(() => {
          isScannerRunning = true;
        }).catch(err => {
          document.getElementById('scannerWrapperZone').style.display = 'none';
        });
      }

      function onScanSuccessCallback(decodedText) {
        if (isProcessingScan) return;
        let normalizedCode = decodedText.toString().trim();
        if (!normalizedCode) return;
        isProcessingScan = true;
        if (navigator.vibrate) navigator.vibrate(100);
        if (html5QrCode) {
          html5QrCode.stop().then(() => {
            isScannerRunning = false;
            html5QrCode = null;
            executeScannedCodeMatch(normalizedCode);
          }).catch(() => {
            executeScannedCodeMatch(normalizedCode);
          });
        } else {
          executeScannedCodeMatch(normalizedCode);
        }
      }

      function executeScannedCodeMatch(code) {
        // Find matching item in database by code
        let match = itemDatabase.find(i => i.code.toString().trim() === code);
        if (match) {
          // Add item to the current bill rows
          const activePrice = match.price;
          // Check if we're in bill mode
          if (currentMode === 'bill') {
            // Add a new row with the scanned item
            const newRow = makeRow(container.children.length, `${match.name} ${activePrice}`);
            container.appendChild(newRow);
            updateSL();
            render();
            // Scroll to the new row
            const lastInput = container.lastChild.querySelector(".input");
            if (lastInput) {
              lastInput.focus();
              scrollToActiveInput(lastInput);
            }
          } else {
            // In entry mode, switch to bill mode first
            toggleViewMode('bill');
            setTimeout(() => {
              const newRow = makeRow(container.children.length, `${match.name} ${activePrice}`);
              container.appendChild(newRow);
              updateSL();
              render();
              const lastInput = container.lastChild.querySelector(".input");
              if (lastInput) {
                lastInput.focus();
                scrollToActiveInput(lastInput);
              }
            }, 300);
          }
          
          document.getElementById('btnResumeCamUI').style.display = "block";
          document.getElementById('btnResumeCamUI').focus();
        } else {
          if (confirm(`Barcode '${code}' database mein nahi mila! Naya product add karein?`)) {
            toggleViewMode('entry');
            document.getElementById('dbCode').value = code;
            document.getElementById('dbName').focus();
          } else {
            resumeHardwareScanning();
          }
        }
      }

      function resumeHardwareScanning() {
        document.getElementById('btnResumeCamUI').style.display = "none";
        document.getElementById('scannerWrapperZone').style.display = 'flex';
        startHardwareCamera();
      }

      function stopHardwareCamera() {
        if (html5QrCode && isScannerRunning) {
          html5QrCode.stop().then(() => {
            isScannerRunning = false;
            html5QrCode = null;
            document.getElementById('scannerWrapperZone').style.display = 'none';
          });
        } else {
          isScannerRunning = false;
          document.getElementById('scannerWrapperZone').style.display = 'none';
        }
        isProcessingScan = false;
      }

      function onScanErrorCallback(err) {
        // Silent error handling (same as first code)
      }

      // 🔥 CAMERA TOGGLE BUTTON EVENT LISTENER
      document.getElementById('btnCamToggle').addEventListener('click', toggleCameraUI);

      // Stop scanner when switching to entry mode
      const originalToggleViewMode = toggleViewMode;
      toggleViewMode = function(mode) {
        if (mode === 'entry') {
          stopHardwareCamera();
        }
        originalToggleViewMode(mode);
      };

      function setCaretToEnd(el){
        const range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }

      function nowDateTimeTick(){
        const now = new Date();
        dateEl.textContent = now.toLocaleDateString('en-IN', {year:'numeric', month:'short', day:'numeric'});
        timeEl.textContent = now.toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12:true});
      }
      setInterval(nowDateTimeTick, 1000);
      nowDateTimeTick();
/*
      function evalExpr(expr){
        try{

      function evalExpr(expr) {
  try {
    // Strip all non-numeric, non-operator characters
    // Keep: digits (0-9), decimal point (.), operators (+, -, *, /, ^), parentheses
    const cleaned = expr.replace(/[^\d.+\-*/^()]/g, '');
    
    if (!cleaned || !/[0-9]/.test(cleaned)) return 0;
    
    const js = cleaned.replace(/\^/g, "**");
    const val = Function('"use strict";return(' + js + ')')();
    if (typeof val === "number" && isFinite(val))
      return Number.isInteger(val) ? val : parseFloat(val.toFixed(2));
  } catch (e) {}
  return 0;
}
      function numberToWordsIndian(num){
        num = Math.floor(Math.abs(num));
        if (num === 0) return "Zero";
        const ones = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
        const tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
        function twoDigits(n){ if(n<20) return ones[n]; return tens[Math.floor(n/10)] + (n%10?" " + ones[n%10]:""); }
        function threeDigits(n){ const h=Math.floor(n/100), r=n%100; return (h?ones[h]+" Hundred":"") + (h&&r?" ":"") + (r?twoDigits(r):""); }
        let words = "";
        const crore = Math.floor(num/10000000); num%=10000000;
        const lakh  = Math.floor(num/100000);   num%=100000;
        const thou  = Math.floor(num/1000);     num%=1000;
        if(crore) words += threeDigits(crore) + " Crore";
        if(lakh)  words += (words?" ":"") + twoDigits(lakh) + " Lakh";
        if(thou)  words += (words?" ":"") + twoDigits(thou) + " Thousand";
        if(num)   words += (words?" ":"") + threeDigits(num);
        return words.trim();
      }

      function totalInWords(amt){

        if (paise>0) s += " and " + numberToWordsIndian(paise) + " Paise";
        return s + " Only";

      function parseAndSaveNewItem(text) {
  const cleanText = text.trim();
  if (!cleanText) return;

  // Split into words
  const words = cleanText.split(/\s+/);
  if (words.length < 2) return;

  // First word = item name
  const itemName = words[0];
  
  // Rest = potential price/expression
  const restPart = words.slice(1).join(' ');
  
  // Clean: remove units and currency symbols
  const cleaned = restPart
    .replace(/\b(rs|c|kg|g|ml|ltr|l|pcs|pc|pack|box|gram|carton|bag|dozen)\b/gi, '')
    .replace(/[₹$€£]/g, '')
    .trim();
  
  if (!itemName || !cleaned) return;

  // Split cleaned part into tokens
  const tokens = cleaned.split(/\s+/);
  
  // Look for a standalone number (no operators) to save as price
  let priceVal = 0;
  
  for (let i = tokens.length - 1; i >= 0; i--) {
    const token = tokens[i];
    // Only save if it's a plain number (no operators)
    if (/^[0-9.]+$/.test(token)) {
      priceVal = parseFloat(token);
      break;
    }
    // If we hit an operator, don't save (it's an expression)
    if (/[+\-*/^]/.test(token)) {
      break;
    }
  }

  // Save to database if valid
  if (itemName && priceVal > 0) {
    const exists = itemDatabase.find(i => i.name.toLowerCase() === itemName.toLowerCase());
    if (!exists) {
      const code = (itemDatabase.length + 101).toString();
      itemDatabase.push({ code, name: itemName, price: priceVal });
      localStorage.setItem("ledger_db_v3", JSON.stringify(itemDatabase));
      renderDatabaseList();
    }
  }
}

      function makeRow(i, text=""){
        const row = document.createElement("div");
        row.className = "row";
        const rowMain = document.createElement("div");
        rowMain.className = "row-main";

        const sl = document.createElement("div");
        sl.className = "sl"; sl.textContent = i+1;

        const wrapper = document.createElement("div");
        wrapper.className = "input-wrapper";

        const input = document.createElement("div");
        input.className = "input";
        
        input.contentEditable = true;
        input.setAttribute("enterkeyhint", "next");
        input.setAttribute("autocorrect", "on");
        input.setAttribute("autocomplete", "on"); 
        input.setAttribute("spellcheck", "false");
        input.textContent = text;

        wrapper.appendChild(input);
        const result = document.createElement("div");
        result.className = "result";

        rowMain.appendChild(sl); rowMain.appendChild(wrapper); rowMain.appendChild(result);

        const codePatch = document.createElement("div");
        codePatch.className = "code-patch";
        
        row.appendChild(rowMain); row.appendChild(codePatch);

        input.addEventListener("input", function() {
          render();
          const val = input.textContent.trim().toLowerCase();
          const oldBox = wrapper.querySelector(".suggest-box");
          if(oldBox) oldBox.remove();
          if(!val) return;

          const matches = itemDatabase.filter(item => 
            item.name.toLowerCase().includes(val) || item.code.toLowerCase().includes(val)
          );

          if(matches.length > 0) {
            const suggestBox = document.createElement("div");
            suggestBox.className = "suggest-box";
            
            matches.forEach(match => {
  const itemDiv = document.createElement("div");
  itemDiv.className = "suggest-item";
  const activePrice = match.price;
  itemDiv.textContent = `${match.name} [${match.code}] - ₹${activePrice}`;
              const selectItem = (e) => {
                e.preventDefault(); e.stopPropagation();
                input.textContent = `${match.name} ${activePrice}`;
                suggestBox.remove();
                render();
                setCaretToEnd(input);
                activeInput = input;
              };

              itemDiv.addEventListener("mousedown", selectItem);
              itemDiv.addEventListener("touchstart", selectItem);
              suggestBox.appendChild(itemDiv);
            });
            wrapper.appendChild(suggestBox);
          }
        });

        input.addEventListener("blur", function() {
          setTimeout(() => {
            const box = wrapper.querySelector(".suggest-box");
            if(box) box.remove();
            
            const currentText = input.textContent.trim();
            if (currentText) { parseAndSaveNewItem(currentText); }
            render();
          }, 350); 
        });

        input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    const currentText = input.textContent.trim();
    if(currentText !== ""){
      // Try to save to database before creating new row
      parseAndSaveNewItem(currentText);
      container.appendChild(makeRow(container.children.length));
      updateSL();
      render();
      const lastInput = container.lastChild.querySelector(".input");
      lastInput.focus();
      scrollToActiveInput(lastInput);
    }
  }
          if(e.key === "Backspace" && input.textContent.trim() === ""){
            if(container.children.length > 1){
              e.preventDefault();
              const prev = row.previousElementSibling || row.nextElementSibling;
              row.remove();
              updateSL();
              render();
              if(prev){
                const target = prev.querySelector(".input");
                target.focus();
                setCaretToEnd(target);
                scrollToActiveInput(target);
              }
            }
          }
        });

        return row;
      }

          } else {

            if (foundItem) {

          if (currentMode === 'bill') {
  // STEP A: Extract everything after the first word (item name)
  const words = text.split(/\s+/);
  let exprPart = '';
  if (words.length > 1) {
    exprPart = words.slice(1).join(' ');
  } else {
    exprPart = text;
  }
  
  // STEP B: Clean — remove units and currency symbols, keep spaces/operators/digits
  let cleaned = exprPart
    .replace(/\b(rs|c|kg|g|ml|ltr|l|pcs|pc|pack|box|gram|carton|bag|dozen)\b/gi, '')
    .replace(/[₹$€£]/g, '')
    .trim();
  
  // STEP C: Collapse spaces around operators (e.g., "150 * 5" → "150*5")
  cleaned = cleaned.replace(/\s*([+\-*/^])\s*/g, '$1');
  
  // STEP D: Split by spaces, find the token with an operator (most likely calculation)
  const tokens = cleaned.split(/\s+/);
  let calcExpr = '';
  
  // Priority: find token containing an operator
  for (let i = tokens.length - 1; i >= 0; i--) {
    if (/[+\-*/^]/.test(tokens[i]) && /[0-9]/.test(tokens[i])) {
      calcExpr = tokens[i];
      break;
    }
  }
  
  // Fallback: last token with a number
  if (!calcExpr) {
    for (let i = tokens.length - 1; i >= 0; i--) {
      if (/^[0-9.]+$/.test(tokens[i])) {
        calcExpr = tokens[i];
        break;
      }
    }
  }
  
  // STEP E: Evaluate
  if (calcExpr && /[0-9]/.test(calcExpr)) {
    val = evalExpr(calcExpr);
  }
  
  resBox.textContent = val ? val.toLocaleString('en-IN') : "";
  grand += val;
  resBox.style.display = "block";
} else {
  resBox.style.display = "none";
}

      /* ---------- 🖨️ PRO+ THERMAL PRINT ENGINE WITH DYNAMIC TRANSLATION & ALIGNMENT ---------- */
async function printBill() {
  let validRows = [];
  [...container.children].forEach(row => {
    const itemText = row.querySelector(".input").textContent.trim();
    const itemTotal = row.querySelector(".result").textContent.trim();
    if(itemText) validRows.push({ text: itemText, total: itemTotal });
  });

  if (validRows.length === 0) return alert("Pehle Bill mein items add karein!");
  
  const currentPrintMode = printModeSelect.value;
  if (currentPrintMode === 'COMP') {
    executeComputerBrowserPrint();
    return;
  }

  try {
    if (!printerDevice) {
      printerDevice = await navigator.bluetooth.requestDevice({
        filters: [{ namePrefix: 'Bluetooth' }, { namePrefix: 'SRS' }, { namePrefix: 'MPT' }, { namePrefix: 'MTP' }],
        optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
      });
    }
    const server = await printerDevice.gatt.connect();
    const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
    const characteristic = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

    const shopTitle = document.getElementById("shopNameInput").value || 'Notebook Bill';
    const cName = document.getElementById('custNameInput').textContent.trim() || "Cash Customer";

    let esc = `\x1B\x40\x1B\x61\x01\x1B\x45\x01${shopTitle.toUpperCase()}\n\x1B\x45\x00OFFLINE COUNTER BILL\n--------------------------------\n`;
    /*esc += '\x1B\x61\x00Date: ' + dateEl.textContent + '\nCust: ' + cName.substring(0, 22) + '\n--------------------------------\nS.No Item                     Amount\n--------------------------------\n';*/
esc += '\x1B\x61\x00Date: ' + dateEl.textContent + '\nCust: ' + cName.substring(0, 22) + '\n--------------------------------\n';
esc += 'S.No Item                      Amt\n';
esc += '--------------------------------\n';
    for (let i = 0; i < validRows.length; i++) {
      let rowItem = validRows[i];
      let finalPrintName = "";

      if (currentPrintMode === 'MULTI') {
        finalPrintName = rowItem.text;
      } else {
        // ENG Mode: Smart Multi-Language Word Extraction & Translation Engine
        let rawLineText = rowItem.text;
        
        // Check if line contains Hindi, Tamil, Urdu or regional characters
        if (/[^\x00-\x7F]/.test(rawLineText)) {
          // Splitting logic: Text words ko math characters aur numbers se alag karna
          let wordsPart = rawLineText.replace(/[0-9.\s()+\-*/^]+/g, " ").trim();
          let mathPart = rawLineText.replace(/[^\d.\s()+\-*/^]+/g, " ").trim();
          
          if(wordsPart) {
            let translatedWords = await autoTranslateText(wordsPart);
            // Re-combine translated text safely with its core mathematical formula expressions
            rawLineText = mathPart ? `${translatedWords} ${mathPart}` : translatedWords;
          }
        }
        // Final hardware text filtering layer to eliminate any accidental junk character printouts
        finalPrintName = rawLineText.replace(/[^\x00-\x7F]/g, "").trim() || "Item Row";
      }

      // Strict 32-Column Thermal Space Alignment Blueprint
      let sNo = (i + 1).toString().padEnd(3, ' '); // 3 chars
      let cleanAmt = rowItem.total.replace(/[₹रु]/g, 'Rs.').trim();
      let amtStr = cleanAmt.padStart(9, ' '); // 9 chars
      
      let nameSpace = 32 - sNo.length - amtStr.length; // Max remaining 20 chars for item text description
      let choppedName = finalPrintName.substring(0, nameSpace).padEnd(nameSpace, ' ');

      esc += sNo + choppedName + amtStr + "\n";
    }
    
    // Total cleanup swapping any remaining symbol references to clean standard Rs string format
    let finalCleanTotal = totalBox.textContent.replace(/[₹रु]/g, 'Rs.');
    esc += "--------------------------------\n" + '\x1B\x61\x02\x1B\x45\x01NET BAL: ' + finalCleanTotal + '\n\x1B\x45\x00' + '\x1B\x61\x01\nTHANK YOU! VISIT AGAIN\n\n\n\n';
    
    let encoder = new TextEncoder("utf-8");
    if (currentPrintMode === 'ENG') { encoder = new TextEncoder("ascii"); }
    
    const data = encoder.encode(esc);
    const chunkSize = 100;
    for (let i = 0; i < data.length; i += chunkSize) {
      await characteristic.writeValue(data.slice(i, i + chunkSize));
      await new Promise(r => setTimeout(r, 50));
    }
    alert("Printed successfully! 🎉");
  } catch (error) {
    alert("Print Error: " + error.message);
    printerDevice = null;
  }
}
printBtn.addEventListener("click", printBill);

/* ---------- 🔥 CORE TRANSLATION ENGINE MODULE ---------- */
async function autoTranslateText(text) {
  if (/^[a-zA-Z0-9\s]+$/.test(text)) return text;
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=${encodeURI(text)}`;
  try {
    const response = await fetch(url);
    const data = await response.json();
    return data[0][0][0];
  } catch (e) { 
    return text; // Fallback in case of server timeout network drops
  }
}

      function renderBillsHistoryList() {
        dbBillsHistoryList.innerHTML = "";
        if(savedBillsHistory.length === 0) {
          dbBillsHistoryList.innerHTML = "<div style='font-size:13px; color:var(--muted); text-align:center; padding:15px;'>Koi saved bill nahi mila.</div>"; return;
        }
        [...savedBillsHistory].reverse().forEach((bill, revIdx) => {
          const actualIdx = savedBillsHistory.length - 1 - revIdx;
          const bRow = document.createElement("div"); bRow.className = "bill-history-row";
          const details = document.createElement("div"); details.className = "bill-meta-details";
          details.innerHTML = `${bill.custName || 'Unknown Cust'} <span>Code: ${bill.billCode} | Total: ${bill.total}</span>`;
          const actions = document.createElement("div"); actions.className = "db-item-actions";

          const editBtn = document.createElement("button"); editBtn.className = "db-action-btn"; editBtn.innerHTML = "✏️";
          editBtn.addEventListener("click", () => {
            document.getElementById("custNameInput").textContent = bill.custName;
            container.innerHTML = "";
            bill.items.forEach((itemText, rIdx) => { container.appendChild(makeRow(rIdx, itemText)); });
            toggleViewMode('bill'); render();
          });

          const deleteBtn = document.createElement("button"); deleteBtn.className = "db-action-btn"; deleteBtn.innerHTML = "❌";
          deleteBtn.addEventListener("click", () => {
            if(confirm(`Are you sure you want to delete bill for "${bill.custName}" (${bill.billCode})?`)) {
              savedBillsHistory.splice(actualIdx, 1);
              localStorage.setItem("notebook_invoice_history", JSON.stringify(savedBillsHistory)); renderBillsHistoryList();
            }
          });
          actions.appendChild(editBtn); actions.appendChild(deleteBtn); bRow.appendChild(details); bRow.appendChild(actions); dbBillsHistoryList.appendChild(bRow);
        });
      }

      clearBtn.addEventListener("click", function(){
        container.innerHTML = ""; document.getElementById("custNameInput").textContent = ""; container.appendChild(makeRow(0)); render();
      });

      container.appendChild(makeRow(0));
      render();
    })();
  </script>
